name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  ci:
    uses: ./.github/workflows/ci.yml

  release:
    needs: ci
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Get Version
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Build and Package Library
        run: |
          TAG_NAME=${{ steps.version.outputs.VERSION }}
          zip -r "ina228_multiplatform-${TAG_NAME}.zip" src include examples library.json LICENSE.txt README.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "INA228 Library ${{ steps.version.outputs.VERSION }}"
          body: |
            ## INA228 Multiplatform Library ${{ steps.version.outputs.VERSION }}

            C++ library for the TI INA228 current, voltage, power, energy, and charge monitor over I2C.

            ### Supported Platforms
            - Arduino / ESP32 (Wire)
            - STM32 (STM32duino & HAL)
            - RP2040 (Arduino core or Pico SDK)

            ### Usage Model
            - Pass the active bus handle directly to the constructor (`&Wire`, `&hi2c1`, `i2c0`)
            - Use 7-bit I2C device addresses on every platform

            ### Installation

            #### PlatformIO
            Add to your `platformio.ini`:
            ```ini
            lib_deps =
                https://github.com/theohg/ina228_multiplatform.git#${{ steps.version.outputs.VERSION }}
            ```

            #### Arduino IDE
            1. Download `ina228_multiplatform-${{ steps.version.outputs.VERSION }}.zip`
            2. Sketch -> Include Library -> Add .ZIP Library
            3. Select the downloaded zip file

            ### Examples
            - `basic_monitoring`
            - `alert_monitoring`

            Full documentation: https://github.com/${{ github.repository }}
          files: |
            ina228_multiplatform-*.zip
          draft: false
          prerelease: false
