name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  # Run CI tests before releasing
  ci:
    uses: ./.github/workflows/ci.yml

  # Create release only if CI passes
  release:
    needs: ci
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Get version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Build and Package Library
        run: |
          TAG_NAME=${{ steps.version.outputs.VERSION }}
          zip -r "ina228_multiplatform-${TAG_NAME}.zip" src include examples library.json library.properties LICENSE.txt README.md CHANGELOG.md

      # Build the release body from the top CHANGELOG.md entry (the version being
      # tagged) followed by the fixed install/platform boilerplate.
      - name: Extract release notes
        env:
          VERSION: ${{ steps.version.outputs.VERSION }}
          REPO: ${{ github.repository }}
        run: |
          python3 - <<'PY'
          import os
          from pathlib import Path

          version = os.environ["VERSION"]
          repo = os.environ["REPO"]

          changelog = Path("CHANGELOG.md").read_text().splitlines()
          notes = []
          capture = False
          for line in changelog:
            if line.startswith("## "):
              if capture:
                break
              capture = True
            if capture:
              notes.append(line)

          if not notes:
            raise SystemExit("No release notes found in CHANGELOG.md")

          body = [
              f"## INA228 Power Monitor Library {version}",
              "",
              "C++ library for the TI INA228 current, voltage, power, energy, and charge monitor via I2C.",
              "",
              *notes[1:],
              "",
              "### Supported Platforms",
              "- Arduino / ESP32 (Wire)",
              "- STM32 (STM32duino & HAL)",
              "- RP2040 (Arduino core or Pico SDK)",
              "",
              "### Usage Model",
              "- Pass the active bus handle directly to the constructor (`&Wire`, `&hi2c1`, `i2c0`)",
              "- Use 7-bit I2C device addresses on every platform",
              "",
              "### Installation",
              "",
              "#### PlatformIO",
              "Add to your `platformio.ini`:",
              "```ini",
              "lib_deps =",
              f"    https://github.com/theohg/ina228_multiplatform.git#{version}",
              "```",
              "",
              "Or download the zip and place in your project's `lib/` directory.",
              "",
              "#### Arduino IDE",
              f"1. Download `ina228_multiplatform-{version}.zip`",
              "2. In Arduino IDE: Sketch → Include Library → Add .ZIP Library",
              "3. Select the downloaded zip file",
              "",
              "### Examples",
              "- `basic_monitoring` - Voltage, current, power, and temperature readings",
              "- `alert_monitoring` - Threshold alerts and overcurrent protection",
              "",
              "See the `examples/` folder for complete code.",
              "",
              "### Documentation",
              f"Full documentation at https://github.com/{repo}",
          ]
          Path("release-body.md").write_text("\n".join(body) + "\n")
          PY

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "INA228 Library ${{ steps.version.outputs.VERSION }}"
          body_path: release-body.md
          files: |
            ina228_multiplatform-*.zip
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
